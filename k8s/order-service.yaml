apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 3 # 支援 Load Balancing 的水平擴展
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        sidecar.istio.io/inject: "true" # 啟用 SPIFFE/mTLS 代理
        prometheus.io/scrape: "true"    # 開放 OpenTelemetry/Prometheus 監控
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: order-app
          image: your-registry/order-service:latest # CI/CD 替換標籤
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "order-db"
            - name: KAFKA_BROKERS
              value: "kafka-cluster:9092"
            - name: PHP_MEMORY_LIMIT
              value: "2048M"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20