apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-gateway
  namespace: zt-event-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-gateway
  template:
    metadata:
      labels:
        app: php-gateway
    spec:
      containers:
        - name: php-gateway
          image: zt-event-gateway-php:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: APP_SERVICE_NAME
              value: php-gateway
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: php-gateway
  namespace: zt-event-gateway
spec:
  selector:
    app: php-gateway
  ports:
    - name: http
      port: 8081
      targetPort: 8081
